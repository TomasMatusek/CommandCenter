---
- name: Setup cc-infra VM
  hosts: cc-infra
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install common tools
      apt:
        name:
          - curl
          - wget
          - git
          - jq
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
        state: present