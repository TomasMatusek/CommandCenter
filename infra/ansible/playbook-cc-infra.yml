---
- name: Setup cc-infra VM
  hosts: cc-infra
  become: true
  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install common tools
      apt:
        name:
          - curl
          - wget
          - git
          - jq
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
        state: present
    
    # Docker
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Add tomas to docker group
      user:
        name: tomas
        groups: docker
        append: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started
    
    # Java 25 (Amazon Corretto)
    - name: Add Corretto GPG key
      shell: |
        curl -fsSL https://apt.corretto.aws/corretto.key | gpg --dearmor -o /etc/apt/keyrings/corretto.gpg
      args:
        creates: /etc/apt/keyrings/corretto.gpg

    - name: Add Corretto repository
      shell: |
        echo "deb [signed-by=/etc/apt/keyrings/corretto.gpg] https://apt.corretto.aws stable main" | tee /etc/apt/sources.list.d/corretto.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/corretto.list

    - name: Install Java 25 Corretto
      apt:
        update_cache: true
        name:
          - java-25-amazon-corretto-jdk
        state: present

    - name: Set JAVA_HOME
      lineinfile:
        path: /etc/environment
        line: 'JAVA_HOME=/usr/lib/jvm/java-25-amazon-corretto'
        create: true
    
    # Docker Registry
    - name: Create registry data directory
      file:
        path: /opt/registry/data
        state: directory
        mode: '0755'

    - name: Start Docker Registry container
      docker_container:
        name: registry
        image: registry:2
        state: started
        restart_policy: always
        ports:
          - "5000:5000"
        volumes:
          - /opt/registry/data:/var/run/docker/registry

    - name: Configure Docker to trust local registry
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["192.168.3.30:5000"]
          }
      notify: Restart Docker